<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>My Profile</h1>
    <p>My Profile page using HTML</p>
</div>

<div class="spacer"></div>

<div class="container">

    <div class="sidebar">
        <h2>Navigation</h2>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Gallery</li>
            <li>Contact</li>
        </ul>
    </div>

    <div class="content">
        <h2>Muhammad Ammar</h2>
        <p>Write something about you.</p>

        <div class="image-container">
            <img src="images/profile_photo.webp" alt="Profile Photo">
            <p>Profile Picture</p>
        </div>

        <h2>My Skills</h2>
        <table>
            <tr>
                <th>Skill</th>
                <th>Experience</th>
            </tr>
            <tr>
                <td>HTML &amp; CSS</td>
                <td>Intermediate</td>
            </tr>
            <tr>
                <td>JavaScript</td>
                <td>Beginner</td>
            </tr>
            <tr>
                <td>SQL</td>
                <td>Beginner</td>
            </tr>
        </table>

        <h2>Contact Form</h2>
        <form>
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label for="email">Email Address:</label>
            <input type="text" id="email" placeholder="Enter your email">

            <label for="message">Your Message:</label>
            <textarea id="message" rows="4" placeholder="Type your message..."></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

</div>

<div class="spacer"></div>

<div class="footer">
    &copy; 2025 My Profile Page
</div>

</body>
</html>

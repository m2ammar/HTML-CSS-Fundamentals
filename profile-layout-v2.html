<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My webpage</title>
    <style>
        body{
            padding:0;
            margin: 0;
        }
        .header{
        background-color: blue;
        text-align: center;
            color: #cccccc;
            padding: 20px 0;
            margin: 0;
        }
        .container{
            display: flex;
            gap: 30px;

        }
        .sidebar{
            flex: 1;
        background-color: darkslategray;
            color: azure;
            margin: 0;
            padding: 20px;
        }
        .content{
            flex: 3;
            background-color: oldlace;
            padding: 20px;
            margin: 0;
        }
        .image{
            text-align: center;
            margin: 20px 0;

        }
        .image img{
            border-collapse: collapse;
            width: 150px;
            border: 4px solid yellow;
            background-color: yellow;
        }
        h2{

        }
        table{
            width: 80%;
            margin: 0 auto;
            border-collapse: collapse;
            text-align: center;
            border-radius: 10px;
            border: 1px solid black;
        }
        th,td{
            border: 1px solid black;
            padding: 10px;
        }
        th{
            background-color: #3498db;
        }
        form{
            border-radius: 8px;
            background-color: #cccccc;
            padding: 20px;
            margin: 20px;
            border: 1px solid;

        }
        label{
            padding: 10px;
            margin: 20px;
            text-align: left;
            vertical-align: top;
        }
        form input[type="text"]{
            display: block;          /* puts inputs on new lines */
            width: 95%;              /* makes inputs wide but leaves a bit of margin */
            margin-bottom: 15px;     /* adds space below each input */
            padding: 8px;            /* space inside the box */
            border-radius: 5px;      /* smooth corners */
            border: 1px solid #666;
        }

    </style>


</head>
<body>
<div class="header">
<h1>My Profile </h1>
<p>My Profile using HTML</p>
</div>

<div class="container">
    <div class="sidebar">
        <h2>Navigation</h2>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Gallery</li>
            <li>FAQ</li>
            <li>Help</li>
        </ul>
    </div>
    <div class="content">
        <h2>Muhammad Ammar</h2>
        <p>Write something about you</p>
        <div class="image">
            <img src="Practice/photo.webp" alt="Profile photo">
            <p>Profile Picture</p>
        </div>
        <h2>My Skills</h2>
        <table>
            <tr>
            <th>Skill</th>
            <th>Experience</th>
            </tr>
            <tr>
                <td>HTML & CSS</td>
                <td>Beginner</td>
            </tr>
            <tr>
                <td>Java</td>
                <td>Beginner</td>
            </tr>
            <tr>
                <td>Others</td>
                <td>Intermediate</td>
            </tr>
        </table>
        <h2>Contact Form</h2>
        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label for="email">Email Address</label>
            <input type="text" id="email" placeholder="Enter your email">

            <label for="message">Your Message</label>
            <input type="text" id="message" placeholder="Type your message...">
            <button type="submit">Submit</button>

        </form>
    </div>
</div>
</body>
</html>
